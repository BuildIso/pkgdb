name: "📦 Package Submission"
description: "Submit a new package to the pkgdb"
title: "[Package]: "
labels: ["automated-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for wanting to add a package! Please fill out the form below.
  - type: input
    id: package_name
    attributes:
      label: "Package Name"
      placeholder: "e.g., MyAwesomeApp"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Package Version"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
  - type: input
    id: download_url
    attributes:
      label: "Download URL"
      placeholder: "https://github.com/user/repo/releases/download/v1/app.exe"
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: "Verification"
      options:
        - label: "I have tested this installer and it works."
          required: true

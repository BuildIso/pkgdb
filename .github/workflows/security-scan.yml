name: check-package
on:
  pull_request:
    branches: [packages] # On scanne les PR qui visent la branche packages
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: VirusTotal Scan
        id: vt
        run: |
          FILE_PATH=$(find packages -name "*.txt" | head -1)
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/URL: //g' | xargs)
          curl -L -o sample.exe "$URL"
          
          RESPONSE=$(curl --request POST --url https://www.virustotal.com/api/v3/files \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" --form file=@sample.exe)
          ID=$(echo $RESPONSE | jq -r '.data.id')
          sleep 45
          MALICIOUS=$(curl --request GET --url "https://www.virustotal.com/api/v3/analyses/$ID" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" | jq -r '.data.attributes.stats.malicious // 0')
          
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Update TXT and Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.vt.outputs.file_path }}"
          M="${{ steps.vt.outputs.malicious }}"
          [ "$M" -gt 5 ] && LOG="Checks not passed ($M detections)" && L="checks-not-passed" || LOG="Checks passed ($M detections)" && L="checks-passed"
          
          sed -i '/Security Scan:/d' "$FILE"
          echo "Security Scan: $LOG" >> "$FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Scan: $LOG" && git push || echo "No changes"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$L"

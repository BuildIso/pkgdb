name: check-package
on:
  pull_request:
    branches: [packages, main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: VirusTotal Scan
        id: vt
        shell: bash
        run: |
          FILE_PATH=$(find packages -name "*.txt" | head -1)
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/.*URL://' | xargs)
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          
          # 1. Vérification de la taille via Header (70Mo bypass)
          FILE_SIZE=$(curl -sI "$URL" | grep -i Content-Length | awk '{print $2}' | tr -d '\r')
          
          if [ ! -z "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 33554432 ]; then
             echo "result=LARGE_FILE" >> $GITHUB_OUTPUT
             exit 0
          fi

          # 2. Tentative de Scan
          curl -L -o sample.exe "$URL"
          RESPONSE=$(curl --request POST --url https://www.virustotal.com/api/v3/files \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe)
          
          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.data.id // empty')
          
          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
             echo "result=API_ERROR" >> $GITHUB_OUTPUT
          else
             sleep 30
             STATS=$(curl --request GET --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
               --header "x-api-key: ${{ secrets.VT_API_KEY }}")
             MALICIOUS=$(echo $STATS | jq -r '.data.attributes.stats.malicious // 0')
             echo "result=$MALICIOUS" >> $GITHUB_OUTPUT
          fi

      - name: Finalize Report and Labels
        if: always() # S'exécute même si l'étape précédente a foiré
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.vt.outputs.file_path }}"
          RES="${{ steps.vt.outputs.result }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          ISSUE_NUM=$(gh pr view $PR_NUM --json body -q '.body' | grep -oP 'Closes #\K\d+')

          # Détermination du statut
          if [ "$RES" == "LARGE_FILE" ]; then
            MSG="⚠️ Skip (File > 32MB) - Manual Review Required"
            LAB="manual-check"
          elif [ "$RES" == "API_ERROR" ] || [ -z "$RES" ]; then
            MSG="❌ Scan Error (API Limit or Invalid File)"
            LAB="scan-failed"
          elif [ "$RES" -gt 0 ]; then
            MSG="🚨 Unsafe ($RES detections)"
            LAB="unsafe"
          else
            MSG="✅ Clean (0 detections)"
            LAB="safe"
          fi

          # Mise à jour du fichier .txt
          sed -i '/Security Scan:/d' "$FILE"
          echo "Security Scan: $MSG" >> "$FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Report: $RES" && git push || echo "No changes"

          # Gestion des Labels et de l'Issue
          gh pr edit $PR_NUM --add-label "$LAB"
          
          if [ "$LAB" == "safe" ]; then
            gh issue comment $ISSUE_NUM --body "Le scan est terminé : **Propre**. La PR sera examinée pour le merge."
          else
            gh issue comment $ISSUE_NUM --body "Attention : $MSG. Un administrateur doit vérifier manuellement."
          fi

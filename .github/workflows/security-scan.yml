name: check-package
on:
  pull_request:
    branches: [packages, main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: VirusTotal Scan
        id: vt
        run: |
          # 1. On cherche le fichier spécifiquement dans le dossier packages/
          # de la branche actuelle (celle de la PR)
          FILE_PATH=$(ls packages/*.txt | head -1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "ERREUR : Aucun fichier .txt trouvé dans le dossier packages/"
            exit 1
          fi
          
          echo "Fichier trouvé : $FILE_PATH"

          # 2. Extraction de l'URL (on nettoie tout ce qui précède "URL:")
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/.*URL://' | xargs)
          
          echo "URL extraite : '$URL'"

          # Vérification si l'URL est vide ou n'est pas un lien
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "ERREUR : L'URL '$URL' n'est pas valide ou est absente du fichier."
            exit 1
          fi

          # 3. La suite du téléchargement (curl -L -o sample.exe "$URL" ...)

          # 3. Téléchargement
          echo "Downloading..."
          curl -L -o sample.exe "$URL"
          
          FILE_SIZE=$(stat -c%s "sample.exe")
          echo "File size: $FILE_SIZE bytes"

          # 4. Gestion des gros fichiers (> 32MB)
          if [ "$FILE_SIZE" -gt 33554432 ]; then
            echo "Large file (>32MB). Getting upload URL..."
            UPLOAD_URL=$(curl --request GET --url https://www.virustotal.com/api/v3/files/upload_url \
              --header "x-api-key: ${{ secrets.VT_API_KEY }}" | jq -r '.data')
          else
            UPLOAD_URL="https://www.virustotal.com/api/v3/files"
          fi

          # 5. Envoi à VirusTotal
          echo "Uploading to VirusTotal..."
          RESPONSE=$(curl --request POST --url "$UPLOAD_URL" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe)
          
          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.data.id // empty')

          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
            echo "VirusTotal Error: $RESPONSE"
            exit 1
          fi

          # 6. Attente (60s pour un gros fichier)
          echo "Waiting for results..."
          sleep 60
          
          STATS=$(curl --request GET --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}")
          
          MALICIOUS=$(echo $STATS | jq -r '.data.attributes.stats.malicious // 0')
          
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Update TXT and Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.vt.outputs.file_path }}"
          M="${{ steps.vt.outputs.malicious }}"
          
          [ "$M" -gt 5 ] && LOG="Checks not passed ($M detections)" && L="checks-not-passed" || LOG="Checks passed ($M detections)" && L="checks-passed"
          
          sed -i '/Security Scan:/d' "$FILE"
          echo "Security Scan: $LOG" >> "$FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Scan: $LOG" && git push || echo "No changes"
          
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$L"

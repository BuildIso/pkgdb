name: VirusTotal Security Scan
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Get URL and Metadata
        id: info
        run: |
          # On récupère l'URL dans le fichier .txt créé par le Bot 1
          FILE_PATH=$(ls packages/*.txt | head -1)
          URL=$(grep "URL:" $FILE_PATH | cut -d' ' -f2-)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: VirusTotal Scan
        id: vt
        run: |
          # Téléchargement du fichier
          curl -L -o sample.exe "${{ steps.info.outputs.url }}"
          
          # Envoi à VirusTotal et récupération du rapport
          # On utilise l'API v3
          ANALYSIS_ID=$(curl --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe | jq -r '.data.id')
          
          echo "Waiting for scan results..."
          sleep 30 # On laisse un peu de temps à VT
          
          # Récupération du score
          STATS=$(curl --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" | jq '.data.attributes.stats')
          
          MALICIOUS=$(echo $STATS | jq '.malicious')
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT

      - name: Process Results
        run: |
          MALICIOUS=${{ steps.vt.outputs.malicious }}
          FILE=${{ steps.info.outputs.file_path }}
          
          if [ "$MALICIOUS" -gt 5 ]; then
            echo "STATUS=checks-not-passed" >> $GITHUB_ENV
            echo "LOG=Checks not passed ($MALICIOUS detections)" >> $GITHUB_ENV
            LABEL="checks-not-passed"
          else
            echo "STATUS=checks-passed" >> $GITHUB_ENV
            echo "LOG=Checks passed ($MALICIOUS detections)" >> $GITHUB_ENV
            LABEL="checks-passed"
          fi
          
          # Mise à jour du fichier .txt
          echo "Security Scan: $LOG" >> $FILE
          echo "Verifying with a human..." >> $FILE
          
          # Push des modifs sur la branche de la PR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Security Scan: $LOG"
          git push

          # Ajout du label à la PR
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABEL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final Comment
        uses: actions/github-script@v6
        with:
          script: |
            const status = process.env.LOG;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Security Report\n**Result:** ${status}\n\nManual verification by a human is still required before merging.`
            })

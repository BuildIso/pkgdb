name: VirusTotal Security Scan
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          # On récupère la branche de la PR, pas main !
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Get Data from TXT
        id: info
        run: |
          # On cherche le fichier dans le dossier packages de la branche PR
          FILE_PATH=$(find packages -name "*.txt" | head -1)
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/URL: //g' | xargs)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: VirusTotal Scan
        id: vt
        run: |
          curl -L -o sample.exe "${{ steps.info.outputs.url }}"
          
          # Envoi à VT
          ANALYSIS_ID=$(curl --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe | jq -r '.data.id')
          
          sleep 45 # Attente des résultats
          
          MALICIOUS=$(curl --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" | jq -r '.data.attributes.stats.malicious // 0')
          
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT

      - name: Write Logs to TXT and Label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.info.outputs.file_path }}"
          MALICIOUS=${{ steps.vt.outputs.malicious }}
          
          if [ "$MALICIOUS" -gt 5 ]; then
            LOG="Checks not passed ($MALICIOUS detections)"
            LABEL="checks-not-passed"
          else
            LOG="Checks passed ($MALICIOUS detections)"
            LABEL="checks-passed"
          fi

          # On écrit les logs DIRECTEMENT dans le fichier sur la branche
          echo "Security Scan: $LOG" >> "$FILE"
          echo "Verifying with a human..." >> "$FILE"

          # On commit les logs sur la branche de la PR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Scan: $LOG"
          git push

          # On met le label sur la PR
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABEL"

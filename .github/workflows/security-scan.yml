name: check-package
on:
  pull_request:
    branches: [packages, main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: VirusTotal Scan
        id: vt
        run: |
          FILE_PATH=$(find packages -name "*.txt" | head -1)
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/.*URL://' | xargs)
          
          # 1. Vérification de la taille avant upload
          # On télécharge juste les headers pour voir la taille
          FILE_SIZE=$(curl -sI "$URL" | grep -i Content-Length | awk '{print $2}' | tr -d '\r')
          
          # Si > 32Mo et que tu n'as pas d'API Premium, on skip le scan auto
          if [ ! -z "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 33554432 ]; then
             echo "malicious=MANUAL_CHECK" >> $GITHUB_OUTPUT
             echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
             echo "Skip: Fichier trop gros (70Mo) pour l'API gratuite."
             exit 0
          fi

          # 2. Si taille OK, on scanne normalement
          curl -L -o sample.exe "$URL"
          RESPONSE=$(curl --request POST --url https://www.virustotal.com/api/v3/files \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe)
          
          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.data.id // empty')
          
          if [ -z "$ANALYSIS_ID" ]; then
             echo "malicious=ERROR" >> $GITHUB_OUTPUT
          else
             sleep 30
             MALICIOUS=$(curl --request GET --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
               --header "x-api-key: ${{ secrets.VT_API_KEY }}" | jq -r '.data.attributes.stats.malicious // 0')
             echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          fi
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Update TXT and Labels
        run: |
          M="${{ steps.vt.outputs.malicious }}"
          FILE="${{ steps.vt.outputs.file_path }}"
          
          if [ "$M" == "MANUAL_CHECK" ]; then
            LOG="Skip (File > 32MB) - Needs Manual Review"
            L="manual-check-required"
          elif [ "$M" == "ERROR" ]; then
            LOG="Scan Error (API Quota?)"
            L="scan-failed"
          elif [ "$M" -gt 0 ]; then
            LOG="Checks not passed ($M detections)"
            L="unsafe"
          else
            LOG="Checks passed"
            L="safe"
          fi

          sed -i '/Security Scan:/d' "$FILE"
          echo "Security Scan: $LOG" >> "$FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Scan: $LOG" && git push || echo "No changes"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$L"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

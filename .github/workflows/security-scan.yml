name: check-package
on:
  pull_request:
    branches: [packages, main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: VirusTotal Scan
        id: vt
        run: |
          FILE_PATH=$(find packages -name "*.txt" | head -1)
          URL=$(grep "URL:" "$FILE_PATH" | sed 's/.*URL://' | xargs)
          
          echo "Downloading from: $URL"
          curl -L -o sample.exe "$URL"
          
          FILE_SIZE=$(stat -c%s "sample.exe")
          echo "File size: $FILE_SIZE bytes"

          # Gestion Gros Fichiers
          if [ "$FILE_SIZE" -gt 33554432 ]; then
            echo "Requesting Large File Upload URL..."
            UP_RES=$(curl --request GET --url https://www.virustotal.com/api/v3/files/upload_url \
              --header "x-api-key: ${{ secrets.VT_API_KEY }}")
            UPLOAD_URL=$(echo $UP_RES | jq -r '.data // empty')
            
            if [ -z "$UPLOAD_URL" ]; then
                echo "ERROR: Could not get upload URL. API Response: $UP_RES"
                exit 1
            fi
          else
            UPLOAD_URL="https://www.virustotal.com/api/v3/files"
          fi

          echo "Uploading to VT..."
          RESPONSE=$(curl --request POST --url "$UPLOAD_URL" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}" \
            --form file=@sample.exe)
          
          # On affiche la réponse pour débugger en cas de crash jq
          echo "API Response: $RESPONSE"
          
          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.data.id // empty')

          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
            echo "VirusTotal Analysis Failed. Check response above."
            exit 1
          fi

          echo "Waiting for results (60s)..."
          sleep 60
          
          STATS=$(curl --request GET --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-api-key: ${{ secrets.VT_API_KEY }}")
          
          MALICIOUS=$(echo $STATS | jq -r '.data.attributes.stats.malicious // 0')
          
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Update TXT and Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.vt.outputs.file_path }}"
          M="${{ steps.vt.outputs.malicious }}"
          
          if [ "$M" -gt 5 ]; then
            LOG="Checks not passed ($M detections)"
            L="checks-not-passed"
          else
            LOG="Checks passed ($M detections)"
            L="checks-passed"
          fi
          
          sed -i '/Security Scan:/d' "$FILE"
          echo "Security Scan: $LOG" >> "$FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Security Scan: $LOG" && git push || echo "No changes"
          
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$L"

name: Issue to Pr
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Package]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: packages
          fetch-depth: 0

      - name: Extract Form Data
        id: vars
        shell: bash
        run: |
          PKG_TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/\[Package\]: //g' | xargs)
          CLEAN_PKG=$(echo "$PKG_TITLE" | tr ' ' '-' | tr -cd '[:alnum:]-')
          BODY='${{ github.event.issue.body }}'
          PKG_NAME=$(echo "$BODY" | awk '/### Package Name/{getline; getline; print}' | xargs)
          PKG_VER=$(echo "$BODY" | awk '/### Package Version/{getline; getline; print}' | xargs)
          PKG_URL=$(echo "$BODY" | awk '/### Download URL/{getline; getline; print}' | xargs)
          if [ -z "$PKG_NAME" ] || [ "$PKG_NAME" = "_No response_" ]; then
            PKG_NAME="$PKG_TITLE"
          fi
          echo "pkg_name=$CLEAN_PKG" >> $GITHUB_OUTPUT
          echo "display_name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VER" >> $GITHUB_OUTPUT
          echo "url=$PKG_URL" >> $GITHUB_OUTPUT

      - name: Create Branch and Commit File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="add-${{ steps.vars.outputs.pkg_name }}"
          
          git checkout packages
          git checkout -b "$BRANCH_NAME"
          
          mkdir -p packages
          FILE_PATH="packages/${{ steps.vars.outputs.pkg_name }}.txt"
          
          # Utilisation de echo au lieu de EOF pour éviter les erreurs YAML
          echo "Package: ${{ steps.vars.outputs.display_name }}" > "$FILE_PATH"
          echo "Version: ${{ steps.vars.outputs.version }}" >> "$FILE_PATH"
          echo "URL: ${{ steps.vars.outputs.url }}" >> "$FILE_PATH"
          echo "Submitted by: ${{ github.event.issue.user.login }}" >> "$FILE_PATH"

          git add "$FILE_PATH"
          git commit -m "Add ${{ steps.vars.outputs.display_name }} v${{ steps.vars.outputs.version }}"
          git push origin "$BRANCH_NAME" --force

      - name: Create Pull Request
        env:
          # On remplace GITHUB_TOKEN par ton nouveau secret
          GH_TOKEN: ${{ secrets.MY_GH_TOKEN }} 
        run: |
          gh label create "automated-check-pending" --color "E99695" --description "Checking in progress" --force || true
          
          gh pr create \
            --title "Add ${{ steps.vars.outputs.display_name }}" \
            --body "Closes #${{ github.event.issue.number }}. Automatic PR to packages branch." \
            --base packages \
            --head "add-${{ steps.vars.outputs.pkg_name }}" \
            --label "automated-check-pending"

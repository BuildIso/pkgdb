name: Issue to Pull Request
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Package]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Info
        id: vars
        run: |
          # Extraction du nom depuis le titre
          PKG=$(echo "${{ github.event.issue.title }}" | sed 's/\[Package\]: //g' | xargs)
          CLEAN_PKG=$(echo "$PKG" | tr ' ' '-')
          
          # Extraction de l'URL depuis le corps (on cherche la ligne après "Download URL")
          URL=$(echo "${{ github.event.issue.body }}" | grep -A 1 "Download URL" | tail -n 1 | xargs)
          
          # Extraction de la version
          VER=$(echo "${{ github.event.issue.body }}" | grep -A 1 "Package Version" | tail -n 1 | xargs)

          echo "pkg_name=$CLEAN_PKG" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "add-${{ steps.vars.outputs.pkg_name }}"
          
          mkdir -p packages
          
          # ON ÉCRIT LE CONTENU RÉEL ICI :
          echo "Package: ${{ steps.vars.outputs.pkg_name }}" > "packages/${{ steps.vars.outputs.pkg_name }}.txt"
          echo "Version: ${{ steps.vars.outputs.version }}" >> "packages/${{ steps.vars.outputs.pkg_name }}.txt"
          echo "URL: ${{ steps.vars.outputs.url }}" >> "packages/${{ steps.vars.outputs.pkg_name }}.txt"
          echo "Submitted by: ${{ github.event.issue.user.login }}" >> "packages/${{ steps.vars.outputs.pkg_name }}.txt"
          
          git add .
          git commit -m "Add ${{ steps.vars.outputs.pkg_name }} v${{ steps.vars.outputs.version }}"
          git push origin "add-${{ steps.vars.outputs.pkg_name }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add ${{ steps.vars.outputs.pkg_name }}" \
            --body "Closes #${{ github.event.issue.number }}. Automatic PR." \
            --base main \
            --head "add-${{ steps.vars.outputs.pkg_name }}"

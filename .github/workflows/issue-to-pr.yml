name: Issue to Pull Request
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: startsWith(github.event.issue.title, '[Package]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Form Data
        id: vars
        shell: bash
        run: |
          # 1. Extraction du nom depuis le titre (plus fiable)
          PKG_TITLE=$(echo "${{ github.event.issue.title }}" | sed 's/\[Package\]: //g' | xargs)
          CLEAN_PKG=$(echo "$PKG_TITLE" | tr ' ' '-')
          
          # 2. Extraction des données du corps de l'Issue
          # On cherche la ligne juste après le titre de la section dans le formulaire
          BODY='${{ github.event.issue.body }}'
          
          PKG_NAME=$(echo "$BODY" | awk '/### Package Name/{getline; getline; print}' | xargs)
          PKG_VER=$(echo "$BODY" | awk '/### Package Version/{getline; getline; print}' | xargs)
          PKG_URL=$(echo "$BODY" | awk '/### Download URL/{getline; getline; print}' | xargs)

          # Fallback au titre si le champ Name est vide
          if [ -z "$PKG_NAME" ]; then PKG_NAME="$PKG_TITLE"; fi

          echo "pkg_name=$CLEAN_PKG" >> $GITHUB_OUTPUT
          echo "display_name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "version=$PKG_VER" >> $GITHUB_OUTPUT
          echo "url=$PKG_URL" >> $GITHUB_OUTPUT

      - name: Create Branch and File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH_NAME="add-${{ steps.vars.outputs.pkg_name }}"
          git checkout -b "$BRANCH_NAME"
          
          mkdir -p packages
          
          # Écriture du fichier avec les données récupérées
          FILE_PATH="packages/${{ steps.vars.outputs.pkg_name }}.txt"
          echo "Package: ${{ steps.vars.outputs.display_name }}" > "$FILE_PATH"
          echo "Version: ${{ steps.vars.outputs.version }}" >> "$FILE_PATH"
          echo "URL: ${{ steps.vars.outputs.url }}" >> "$FILE_PATH"
          echo "Submitted by: ${{ github.event.issue.user.login }}" >> "$FILE_PATH"
          
          git add .
          git commit -m "Add ${{ steps.vars.outputs.display_name }} v${{ steps.vars.outputs.version }}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add ${{ steps.vars.outputs.display_name }}" \
            --body "Closes #${{ github.event.issue.number }}. Automatic PR from Issue Form." \
            --base main \
            --head "add-${{ steps.vars.outputs.pkg_name }}"

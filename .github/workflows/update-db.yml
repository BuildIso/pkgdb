name: Update Global Database
on:
  pull_request:
    types: [closed]
    branches: [packages]

jobs:
  update-json:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Validation-Passed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Packages
        uses: actions/checkout@v4
        with:
          ref: packages

      - name: Checkout Pages
        uses: actions/checkout@v4
        with:
          ref: pages
          path: db-branch

      - name: Update JSON
        run: |
          NEW_FILE=$(ls -t packages/*.txt | head -1)
          P_NAME=$(grep "Package:" $NEW_FILE | sed 's/Package: //g' | xargs)
          P_VER=$(grep "Version:" $NEW_FILE | sed 's/Version: //g' | xargs)
          P_URL=$(grep "URL:" $NEW_FILE | sed 's/URL: //g' | xargs)
          
          cd db-branch
          jq --arg name "$P_NAME" --arg ver "$P_VER" --arg url "$P_URL" \
             '. + {($name): {"version": $ver, "url": $url}}' pkg.json > tmp.json && mv tmp.json pkg.json

      - name: Push to Pages
        run: |
          cd db-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg.json
          git commit -m "Add package to DB"
          git push origin pages

name: Update Global Database
on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  update-json:
    # On ne s'exécute que si la PR a été fusionnée (pas fermée sans merge)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main (PR content)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout Pages Branch (The Database)
        uses: actions/checkout@v4
        with:
          ref: pages
          path: db-branch

      - name: Update JSON logic
        id: update
        run: |
          # 1. On récupère les infos du nouveau fichier (ex: packages/MonApp.txt)
          # On prend le dernier fichier ajouté dans le dossier packages
          NEW_FILE=$(ls -t packages/*.txt | head -1)
          
          PKG_NAME=$(grep "Package:" $NEW_FILE | cut -d' ' -f2-)
          PKG_VER=$(grep "Version:" $NEW_FILE | cut -d' ' -f2-)
          PKG_URL=$(grep "URL:" $NEW_FILE | cut -d' ' -f2-)

          # 2. On va modifier le fichier pkg.json dans la branche pages
          cd db-branch
          
          # Utilisation de 'jq' (outil puissant pour manipuler le JSON)
          # On ajoute l'entrée au JSON existant
          jq --arg name "$PKG_NAME" \
             --arg ver "$PKG_VER" \
             --arg url "$PKG_URL" \
             '. + {($name): {"version": $ver, "url": $url}}' pkg.json > tmp.json && mv tmp.json pkg.json

      - name: Commit and Push to Pages
        run: |
          cd db-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg.json
          git commit -m "Add ${{ steps.update.outputs.pkg_name }} to database"
          git push origin pages

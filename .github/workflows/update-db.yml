name: Update Global Database
on:
  pull_request:
    types: [closed]
    branches: [packages]

permissions:
  contents: write

jobs:
  update-json:
    # On utilise bien 'checks-passed' ici !
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'checks-passed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Packages Branch
        uses: actions/checkout@v4
        with:
          ref: packages

      - name: Checkout Pages Branch
        uses: actions/checkout@v4
        with:
          ref: pages
          path: db-branch

      - name: Update JSON
        run: |
          # 1. On récupère le fichier .txt le plus récent
          NEW_FILE=$(ls -t packages/*.txt | head -1)
          echo "Processing file: $NEW_FILE"
          
          # 2. Extraction blindée des données
          P_NAME=$(grep "Package:" "$NEW_FILE" | cut -d':' -f2- | xargs)
          P_VER=$(grep "Version:" "$NEW_FILE" | cut -d':' -f2- | xargs)
          P_URL=$(grep "URL:" "$NEW_FILE" | cut -d':' -f2- | xargs)
          
          # 3. Aller dans le dossier de la branche pages
          cd db-branch
          
          # Créer le JSON s'il n'existe pas
          if [ ! -f pkg.json ]; then echo "{}" > pkg.json; fi
          
          # 4. Mise à jour via JQ
          jq --arg name "$P_NAME" --arg ver "$P_VER" --arg url "$P_URL" \
             '. + {($name): {"version": $ver, "url": $url}}' pkg.json > tmp.json && mv tmp.json pkg.json

      - name: Push to Pages
        run: |
          cd db-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add pkg.json
          # On ne commit que s'il y a vraiment une différence
          if git diff --staged --quiet; then
            echo "Aucun changement détecté dans pkg.json"
          else
            git commit -m "Update DB: Added package $P_NAME"
            git push origin pages
          fi
